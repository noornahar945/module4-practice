<!DOCTYPE html>

    <meta charset="UTF-8">

    <title>flex layout</title>
 
  <style>

    /* box er abba hocceh container mne hocceh ekhne 2 ta class acheh 
    1st div er class name container jeta hocceh parent 
    and 2nd div er class name box jeta hocceh child
    orthat ekhane box er parent hocceh container  */
    .container{
        display: flex;
        flex-direction: row-reverse;
        /* flex-direction: column; */
        /* gap:20px; */
        /* justify-content: space-between; */
        justify-content: space-around;

    }

    .box{
        border: 3px solid blue;
        height: 100px;
        font-size:2rem;
        /* display:inline;  chid o display inline diye ekline e ana jay but 
        onk  somoy jhamela kore and aro designs kora jay na tai parent e design korte hoy; */
    }
    div{
        font-size:2rem;
    }

    .user-container{
        display: flex;
        justify-content: space-around;
        flex-wrap: wrap;
    }
    .user{
        border: 3px solid red;
        height: 100px;
    }
    .pic-container{
        display: flex;
        border: 3px solid green; 
        justify-content: center;
        align-items: center; /*horijontally and vertically center korte chaile ageh
                              display flex dite hobe parent e then justify content(horizontally) and align item (vertically ) 2 ta ar value center dite hobe*/
        height: 500px;
    }
    .picture{
        border: 3px solid purple;
        width: 200px;
        height: 200px;
    }

  </style>
