    <title>calender</title>
    <style>
        .container {
            display: grid;
            grid-template-columns: repeat(7, 1fr); /* eta ekta kaj e use korsi ei khetre 7 ta colomn banaite */
             /*grid-template-rows: repeat(6, 1fr); /*hight na diye eta korle prottek ta row total jaygar 1fr kore jayga nibe*/
             grid-template-rows: 30px repeat(5, 80px); /*evabeo kora jay 1st row ta 30px nibe then bki 5 ta row tey repeat hbe 100px */

        }

            justify-content: center;
            align-items: center;
            border-radius: 10px;
            /* text-align: center; eikhane align na diye only text diyecilam center e ase nai ...align item deyar pore ascheh ... text align e kono change e ase na */
          
        }
        .day-name{

            /* height: 30px; heigth na dileo jototuku jayga acheh tarmoddeh adjust kore nibe */
            background-color: rgb(176, 194, 210);
        }
    </style>
</head>
